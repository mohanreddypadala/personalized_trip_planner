<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI-Powered Trip Planner{% endblock %}</title>
    {% load static %}
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom Global CSS -->
    <link rel="stylesheet" href="{% static 'css/global_style.css' %}">
    {% block extra_css %}{% endblock %}
    <style>
        :root {
            --primary-color: #0071e3;
            --primary-hover: #147ce5;
            --secondary-color: #34c759;
            --dark-color: #1d1d1f;
            --light-color: #f5f5f7;
            --text-dark: #1d1d1f;
            --text-light: #f5f5f7;
            --text-secondary: #86868b;
        }
        
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--light-color);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }
        
        main {
            flex: 1;
            overflow-x: hidden;
        }
        
        /* Apple-style navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding: 0.5rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 600;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            color: var(--text-dark);
        }
        
        .navbar-brand img {
            transition: transform 0.3s ease;
            margin-right: 8px;
        }
        
        .navbar-brand:hover img {
            transform: scale(1.1);
        }
        
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem;
            margin: 0 0.2rem;
            border-radius: 18px;
            transition: all 0.3s ease;
            position: relative;
            color: var(--text-dark);
            font-size: 14px;
        }
        
        .nav-link:not(.btn):hover {
            background-color: rgba(0, 0, 0, 0.05);
        }
        
        .nav-link.active:not(.btn) {
            font-weight: 600;
        }
        
        .btn-get-started {
            background-color: var(--primary-color);
            color: white;
            font-weight: 500;
            border-radius: 980px;
            padding: 0.5rem 1.25rem;
            transition: all 0.3s ease;
            font-size: 14px;
            border: none;
        }
        
        .btn-get-started:hover {
            background-color: var(--primary-hover);
            transform: scale(1.03);
        }
        
        /* Apple-style footer */
        footer {
            background: var(--dark-color);
            color: var(--text-light);
            padding: 2.5rem 0;
            margin-top: 4rem;
        }
        
        footer p {
            margin-bottom: 0;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        footer a:hover {
            color: var(--text-light);
            text-decoration: underline;
        }
        
        /* Animation for logo */
        @keyframes subtleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .floating-logo {
            animation: subtleBounce 3s ease-in-out infinite;
        }
        
        /* Apple-style glass effect */
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'core:home' %}">
                <img src="{% static 'img/logo.png' %}" alt="AI Trip Planner Logo" width="24" height="24" class="d-inline-block align-text-top floating-logo">
                <span>AI Trip Planner</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.view_name == 'core:home' %}active{% endif %}" href="{% url 'core:home' %}">
                            <i class="bi bi-house-door me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.view_name == 'core:about' %}active{% endif %}" href="{% url 'core:about' %}">
                            <i class="bi bi-info-circle me-1"></i>About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.view_name == 'core:team' %}active{% endif %}" href="{% url 'core:team' %}">
                            <i class="bi bi-people me-1"></i>Our Team
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                        <a class="nav-link btn btn-get-started" href="{% url 'trip_planner_app:plan_trip' %}">
                            <i class="bi bi-rocket-takeoff me-1"></i>Get Started
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        <!-- Content will be injected here by child templates -->
        {% endblock %}
    </main>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col-md-6 text-center text-md-start">
                    <p>© {% now "Y" %} AI-Powered Trip Planner. All rights reserved.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <p>
                        <a href="#" class="me-3">Privacy Policy</a>
                        <a href="#">Terms of Service</a>
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
